# Optimistic scenario: high input, high conversion, large duplex panel.
# The "best plausible chemistry" case for sizing the design ceiling.

[molecules]
input_ng = 80.0
conversion_efficiency = 0.6
strand_recovery = 0.5         # duplex: fewer usable molecules, far lower error

[panel]
n_variants = 2000
clonal = false
ccf_alpha = 12.0              # panel selected for truncal variants
ccf_beta = 1.0
dropout_prob = 0.0

[error]
model = "preset"
regime = "DUPLEX"             # ~1e-7 per-base error
sigma = 0.0

[detection]
rule = "aggregate"            # aggregate | kofn
alpha = 0.05

[target]
tf = 1e-6                     # 1 ppm TF stretch target
specificity = 0.999
hit_rate = 0.95
